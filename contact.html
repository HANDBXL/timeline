<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Timeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 40px;
            overflow-x: hidden;
        }

        .back-link {
            position: fixed;
            top: 20px;
            right: 25px;
            color: #fff;
            text-decoration: none;
            font-size: 3.5rem;
            font-weight: 200;
            line-height: 1;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .back-link:hover {
            opacity: 1;
        }

        .content {
            max-width: 550px;
            text-align: left;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .presentation {
            font-size: 1rem;
            line-height: 1.7;
            font-weight: 400;
            margin-bottom: 25px;
            opacity: 0.85;
        }

        .signature {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 45px;
            opacity: 0.9;
        }

        .socials {
            display: flex;
            gap: 28px;
            align-items: center;
        }

        .social-link {
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            opacity: 0.7;
            transition: opacity 0.3s, transform 0.3s;
        }

        .social-link:hover {
            opacity: 1;
            transform: translateY(-2px);
        }

        .social-link svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
        }

        @media (max-width: 600px) {
            body {
                padding: 40px 25px;
            }
            .title {
                font-size: 1.2rem;
            }
            .presentation {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link" aria-label="Fermer">&times;</a>

    <div class="content">
        <h1 class="title">Contact</h1>

        <p class="presentation" id="presentation"></p>

        <p class="signature">Jean-Charles Frémont</p>

        </div>
    </div>

    <script>
        const translations = {
            fr: {
                title: "Contact",
                presentation: "Cette timeline regroupe mes travaux d'illustration, mes expérimentations et mes recherches plastiques. C'est une plongée libre dans mon univers, du premier croquis à l'encre aux compositions numériques et expérimentations actuelles. Sans contraintes ni cadres, voici le fil rouge de ma pratique visuelle."
            },
            en: {
                title: "Contact",
                presentation: "This timeline brings together my illustration work, experiments, and visual research. It's a free dive into my universe, from my first ink sketches to digital compositions and ongoing experiments. Without constraints or boundaries, here's the thread of my visual practice."
            },
            es: {
                title: "Contacto",
                presentation: "Esta cronología reúne mis trabajos de ilustración, mis experimentos y mis investigaciones plásticas. Es una inmersión libre en mi universo, desde los primeros bocetos a tinta hasta las composiciones digitales y los experimentos actuales. Sin limitaciones ni marcos, este es el hilo conductor de mi práctica visual."
            },
            de: {
                title: "Kontakt",
                presentation: "Diese Timeline vereint meine Illustrationsarbeiten, Experimente und bildnerischen Forschungen. Es ist ein freier Tauchgang in meine Welt, von der ersten Tuscheskizze bis zu digitalen Kompositionen und aktuellen Experimenten. Ohne Einschränkungen oder Rahmen: der rote Faden meiner visuellen Praxis."
            }
        };
        const lang = (navigator.language || 'fr').toLowerCase().slice(0, 2);
        const t = translations[lang] || translations.en;
        document.title = t.title + " | Timeline";
        document.querySelector('.title').textContent = t.title;
        document.getElementById('presentation').textContent = t.presentation;
    </script>
</body>
</html>
